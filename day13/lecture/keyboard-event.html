<!DOCTYPE html>
<html>
  <head>
    <title>Keyboard Event</title>
  </head>
  <body>
    <input id="text-input" type="text" placeholder="키보드 이벤트 테스트" />
    <script>
      const input = document.getElementById("text-input");
      input.addEventListener("keydown", function (event) {
        console.log(event);
        console.log("keydown 이벤트 발생: " + event.key);
      })
    </script>
  </body>
</html>
