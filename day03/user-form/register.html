<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>User Registration Form</title>
        <link rel="stylesheet" href="./style.css" />
    </head>
    <body>
        <header>
            <h1>회원가입</h1>
            <nav>
                <p>다른 계정으로 회원가입</p>
                <a class="move" href="#">구글</a>
                <a class="move" href="#">네이버</a>
                <a class="move" href="#">카카오</a>
            </nav>
        </header>
        <hr>
        <main class="container">
            <!-- section1 form -->
            <section class="content">
                <form id="registration-form" action="#" method="GET">
                    <h2>사용자 정보를 입력하세요</h2>
                    <div>
                        <p class="form-group">이름</p>
                        <input type="text" name="name" placeholder="name">
                    </div>
                    <div>
                        <p class="form-group">이메일</p>
                        <input type="email" name="email" placeholder="e-mail">
                    </div>
                    <div>
                        <p class="form-group">비밀번호</p>
                        <input type="password" name="password" placeholder="password">
                    </div>
                    <div>
                        <p class="form-group">비밀번호 확인</p> 
                        <input type="password" name="verify" placeholder="verify password">
                    </div>
                    <div>
                        <p class="form-group">생년월일</p> 
                        <input type="date" name="birthdate">
                    </div>
                    <div>
                        <p class="form-group">나이</p>
                        <input type="number" name="age" placeholder="age" min="18" max="100">
                    </div>
                    <div>
                        <p class="form-group">성별</p>
                        <div class="gender">
                            <input type="radio" id="male" name="gender" value="male">
                            <label for="male">남자</label>
                        </div>
                        <div class="gender">
                            <input type="radio" id="female" name="gender" value="female">
                            <label for="female">여자</label>
                        </div>
                        <div class="gender">
                            <input type="radio" id="other" name="gender" value="other">
                            <label for="other">그 외</label>
                        </div>
                    </div>
                    <div>
                        <p class="form-group">국가</p>
                        <select name="nation">
                            <option value="South Korea">대한민국</option>
                            <option value="USA">미국</option>
                            <option value="UK">영국</option>
                            <option value="Japan">일본</option>
                            <option value="China">중국</option>
                        </select>
                    </div>
                    <div>
                        <p class="form-group">관심사</p>
                        <div class="interest">
                            <input type="checkbox" id="reading" name="interest" value="reading">
                            <label for="reading">독서</label>
                        </div>
                        <div class="interest">
                            <input type="checkbox" id="comics" name="interest" value="comics">
                            <label for="comics">만화</label>
                        </div>
                        <div class="interest">
                            <input type="checkbox" id="movie" name="interest" value="movie">
                            <label for="movie">영화</label>
                        </div>
                        <div class="interest">
                            <input type="checkbox" id="animation" name="interest" value="animation">
                            <label for="animation">애니메이션</label>
                        </div>
                        <div class="interest">
                            <input type="checkbox" id="translating" name="interest" value="translating">
                            <label for="translating">번역</label>
                        </div>
                        <div class="interest">
                            <input type="checkbox" id="comunity" name="interest" value="comunity">
                            <label for="comunity">커뮤니티</label>
                        </div>
                    </div>
                    <div>
                        <p class="form-group">만족도?</p>
                        <input class="rangeInput" type="range" name="rating" min="1" max="10">
                    </div>
                    <!-- 버튼 -->
                    <div id="registration-form-button">
                        <button type="submit">회원가입</button>
                        <button type="reset">초기화</button>
                        &nbsp;
                        <a class="move" href="./login.html">로그인 화면으로 되돌아가기</a>
                    </div>
                </form>
            <!-- section2 side bar -->
            </section>
            <section class="sidebar">
                <article>
                    <h4>회원가입을 하면?</h4>
                    <ul>
                        <li><strong>책갈피</strong>를 사용할 수 있어요</li>
                        <li>누구나 번역에 참여할 수 있어요</li>
                        <li>기여도에 따라 보상을 받을 수 있어요</li>
                    </ul>
                </article>
                <aside>
                    <h4>광고</h4>
                    <video 
                    src="https://www.w3schools.com/html/mov_bbb.mp4" 
                    controls width="300"></video>
                    <br>
                    <svg width="300" height="522">
                        <rect x="0" y="10" width="300" height="160" stroke="black" stroke-width="1" fill="green"/>
                        <rect x="0" y="180" width="300" height="160" stroke="black" stroke-width="1" fill="green"/>
                        <rect x="0" y="350" width="300" height="160" stroke="black" stroke-width="1" fill="green"/>
                    </svg>
                </aside>
            </section>
        </main>
        <hr>
        <footer>
            <p>&copy; All Rights Reserved</p>
        </footer>
    </body>
</html>
